            { id: 66, name: "岡鐵牛鍋物工廠", city: "高雄市", district: "岡山區", address: "高雄市岡山區成功路17號", phone: "07-622-5922", hours: "11:00-14:30, 17:00-22:00", tags: ["溫體牛", "鍋物"] },
            { id: 67, name: "青葉冰城", city: "高雄市", district: "岡山區", address: "高雄市岡山區中華路1之1號", phone: "07-626-5578", hours: "11:00-22:00", tags: ["水冰", "綠豆湯"] },
            { id: 68, name: "春櫻壽司", city: "高雄市", district: "岡山區", address: "高雄市岡山區大義二路56號", phone: "07-625-5997", hours: "11:30-14:00, 17:30-21:30 (週一休)", tags: ["日本料理", "大份量"] },
            { id: 69, name: "小洞天燒餅", city: "高雄市", district: "岡山區", address: "高雄市岡山區岡山路333號", phone: "07-622-1210", hours: "05:30-09:30, 13:30-18:00 (週一休)", tags: ["酥餅", "銅板美食"] },
            { id: 70, name: "五旗麻辣燙", city: "高雄市", district: "岡山區", address: "高雄市岡山區前峰路33之2號", phone: "0968-920-818", hours: "16:30-23:30 (週六休)", tags: ["麻辣串串", "宵夜"] },
            { id: 71, name: "新源發早餐店", city: "高雄市", district: "岡山區", address: "高雄市岡山區平和路154號", phone: "07-621-5246", hours: "06:30-12:10", tags: ["木瓜醬", "烤土司"] },
            { id: 72, name: "三塊厝鹹湯圓", city: "高雄市", district: "岡山區", address: "高雄市岡山區中華路160號", phone: "07-625-8137", hours: "09:00-21:00", tags: ["鹹湯圓", "傳承50年"] },
            { id: 73, name: "岡山明德豆瓣醬 (老醬舖)", city: "高雄市", district: "岡山區", address: "高雄市岡山區河堤路二段128號", phone: "07-629-6448", hours: "09:00-21:00", tags: ["豆瓣醬", "伴手禮"] },
            { id: 74, name: "岡山牛牛肉涮涮鍋", city: "高雄市", district: "岡山區", address: "高雄市岡山區公園西路三段39-1號", phone: "07-625-8831", hours: "11:00-21:00", tags: ["溫體牛肉", "涮涮鍋"] },
            { id: 75, name: "炭黔燒肉 (岡山店)", city: "高雄市", district: "岡山區", address: "高雄市岡山區岡山路40號", phone: "07-621-1628", hours: "一~五 11:30-14:30, 17:00-22:00 / 六日 11:00-22:30", tags: ["日式燒肉", "霸氣上菜"] },
            { id: 76, name: "一品羊肉店", city: "高雄市", district: "岡山區", address: "高雄市岡山區大昌街79號", phone: "07-625-0478", hours: "10:30-21:00", tags: ["羊肉爐", "老字號"] },
            { id: 77, name: "源坐羊肉店", city: "高雄市", district: "岡山區", address: "高雄市岡山區中華路1-2號", phone: "07-626-6518", hours: "09:00-23:00", tags: ["羊肉爐", "人氣推薦"] },
            { id: 78, name: "品銘無油現烤蛋糕 (岡山門市)", city: "高雄市", district: "岡山區", address: "高雄市岡山區公園東路68號", phone: "07-621-7899", hours: "二~六 15:00-19:00 (日一休)", tags: ["無油蛋糕", "伴手禮"] },
            { id: 79, name: "小泉聚場 (岡山旗艦店)", city: "高雄市", district: "岡山區", address: "高雄市岡山區捷安路1巷2號3樓", phone: "07-625-3778", hours: "11:00-22:00", tags: ["日系大阪美食", "樂購廣場"] },
            { id: 80, name: "藏壽司 (高雄岡山店)", city: "高雄市", district: "岡山區", address: "高雄市岡山區捷安路25號", phone: "", hours: "", tags: ["迴轉壽司", "日本料理"] },
            { id: 81, name: "KCA 岡大匯館", city: "高雄市", district: "岡山區", address: "高雄市岡山區維新東街51號", phone: "07-623-3895", hours: "11:30-14:30, 17:30-21:30", tags: ["定食", "吃到飽"] },
            { id: 82, name: "桂桃嬷販麵洋行 (楠梓朝明店)", city: "高雄市", district: "楠梓區", address: "高雄市楠梓區朝明路160巷2號", phone: "07-353-9899", hours: "11:30-14:30, 17:00-21:00", tags: ["南洋料理", "復古大戲院風", "咖哩意麵"] }
        ];

        const CITIES = ["全部", "彰化縣", "嘉義市", "台南市", "高雄市", "東京"];

        // 加入彰化縣員林市及台南市永康區的排序設定 
        const DISTRICT_ORDER = {
            "員林市": 5,
            "東區": 10, "西區": 11,
            "安南區": 20, "中西區": 21, "安平區": 22, "永康區": 23,
            "岡山區": 30, "楠梓區": 31, "左營區": 32, "鼓山區": 33, "三民區": 34, "新興區": 35, "苓雅區": 36, "前鎮區": 37,
            "東京都": 99,
        };

        // --- 主程式 App ---
        function App() {
            const [searchQuery, setSearchQuery] = useState('');
            const [activeCity, setActiveCity] = useState('全部');
            const [activeDistrict, setActiveDistrict] = useState('全部');
            const [sortBy, setSortBy] = useState('default');

            const handleCityChange = (city) => {
                setActiveCity(city);
                setActiveDistrict('全部');
            };

            const availableDistricts = useMemo(() => {
                if (activeCity === '全部') return [];
                const districtsInCity = new Set(
                    SHOPS.filter(shop => shop.city === activeCity).map(shop => shop.district)
                );
                return Array.from(districtsInCity).sort((a, b) => {
                    const orderA = DISTRICT_ORDER[a] || 999;
                    const orderB = DISTRICT_ORDER[b] || 999;
                    return orderA - orderB;
                });
            }, [activeCity]);

            const filteredAndSortedShops = useMemo(() => {
                let result = SHOPS;

                if (activeCity !== '全部') {
                    result = result.filter(shop => shop.city === activeCity);
                }

                if (activeDistrict !== '全部') {
                    result = result.filter(shop => shop.district === activeDistrict);
                }

                if (searchQuery.trim() !== '') {
                    const lowerQuery = searchQuery.toLowerCase();
                    result = result.filter(shop => 
                        shop.name.toLowerCase().includes(lowerQuery) ||
                        shop.address.toLowerCase().includes(lowerQuery) ||
                        shop.tags.some(tag => tag.toLowerCase().includes(lowerQuery))
                    );
                }

                if (sortBy === 'nameAsc') {
                    result = [...result].sort((a, b) => a.name.localeCompare(b.name, 'zh-TW'));
                } else if (sortBy === 'nameDesc') {
                    result = [...result].sort((a, b) => b.name.localeCompare(a.name, 'zh-TW'));
                }

                return result;
            }, [searchQuery, activeCity, activeDistrict, sortBy]);

            const handleGoogleSearch = (shopName, address) => {
                const query = encodeURIComponent(`${shopName} ${address}`);
                window.open(`https://www.google.com/search?q=${query}`, '_blank');
            };

            return (
                <div className="min-h-screen bg-[#FFF9F2] font-sans text-amber-900">
                    <header className="sticky top-0 z-20 bg-white shadow-[0_4px_20px_-10px_rgba(234,88,12,0.3)] pt-safe pb-4 px-4 border-b-4 border-orange-400">
                        <div className="max-w-3xl mx-auto">
                            <div className="flex items-center gap-2 py-3">
                                <span className="text-3xl tracking-tighter" role="img" aria-label="熊兔貓">🐻🐰🐱</span>
                                <h1 className="text-2xl font-black tracking-wide text-transparent bg-clip-text bg-gradient-to-r from-orange-500 to-red-500">
                                    口袋美食地圖
                                </h1>
                            </div>
                            
                            <div className="flex gap-2 mt-1">
                                <div className="relative flex-1 group">
                                    <div className="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                                        <Search className="h-5 w-5 text-orange-300 group-focus-within:text-orange-500 transition-colors" />
                                    </div>
                                    <input
                                        type="text"
                                        placeholder="找找想吃的..."
                                        value={searchQuery}
                                        onChange={(e) => setSearchQuery(e.target.value)}
                                        className="block w-full pl-10 pr-3 py-3 border-2 border-orange-100 rounded-2xl leading-5 bg-[#FFF9F2] placeholder-orange-300 focus:outline-none focus:bg-white focus:ring-4 focus:ring-orange-500/20 focus:border-orange-500 transition-all font-medium sm:text-sm shadow-inner"
                                    />
                                </div>
                                
                                <div className="relative">
                                    <select
                                        value={sortBy}
                                        onChange={(e) => setSortBy(e.target.value)}
                                        className="h-full pl-3 pr-8 py-2 border-2 border-orange-100 rounded-2xl bg-white text-orange-700 focus:outline-none focus:ring-4 focus:ring-orange-500/20 focus:border-orange-500 appearance-none text-sm font-bold shadow-sm"
                                    >
                                        <option value="default">預設排序</option>
                                        <option value="nameAsc">名稱 (A-Z)</option>
                                        <option value="nameDesc">名稱 (Z-A)</option>
                                    </select>
                                    <ArrowUpDown className="absolute right-2.5 top-1/2 transform -translate-y-1/2 h-4 w-4 text-orange-400 pointer-events-none" />
                                </div>
                            </div>
                        </div>
                    </header>

                    <main className="max-w-3xl mx-auto px-4 mt-6">
                        <div className="flex overflow-x-auto pb-2 -mx-4 px-4 hide-scrollbar snap-x">
                            <div className="flex gap-3">
                                {CITIES.map(city => (
                                    <button
                                        key={city}
                                        onClick={() => handleCityChange(city)}
                                        className={`snap-start whitespace-nowrap px-6 py-2.5 rounded-full text-base font-bold transition-all duration-300 transform active:scale-95
                                            ${activeCity === city 
                                                ? 'bg-gradient-to-r from-orange-400 to-red-500 text-white shadow-[0_4px_12px_rgba(234,88,12,0.3)]' 
                                                : 'bg-white text-orange-800 border-2 border-orange-100 hover:bg-orange-50 shadow-sm'}`}
                                    >
                                        {city}
                                    </button>
                                ))}
                            </div>
                        </div>

                        {activeCity !== '全部' && availableDistricts.length > 0 && (
                            <div className="flex overflow-x-auto pt-2 pb-4 -mx-4 px-4 hide-scrollbar snap-x mt-1">
                                <div className="flex gap-2">
                                    <button
                                        onClick={() => setActiveDistrict('全部')}
                                        className={`snap-start whitespace-nowrap px-4 py-1.5 rounded-full text-sm font-bold transition-all
                                            ${activeDistrict === '全部'
                                                ? 'bg-amber-500 text-white shadow-md'
                                                : 'bg-amber-100 text-amber-700 hover:bg-amber-200'}`}
                                    >
                                        全區
                                    </button>
                                    {availableDistricts.map(district => (
                                        <button
                                            key={district}
                                            onClick={() => setActiveDistrict(district)}
                                            className={`snap-start whitespace-nowrap px-4 py-1.5 rounded-full text-sm font-bold transition-all
                                                ${activeDistrict === district
                                                    ? 'bg-amber-500 text-white shadow-md'
                                                    : 'bg-amber-100 text-amber-700 hover:bg-amber-200'}`}
                                        >
                                            {district}
                                        </button>
                                    ))}
                                </div>
                            </div>
                        )}

                        <div className="flex items-center gap-2 text-sm font-medium text-orange-600/80 my-5 px-1">
                            <Flame className="w-4 h-4" />
                            <span>為您尋找到 {filteredAndSortedShops.length} 間美味口袋名單</span>
                        </div>

                        <div className="grid gap-5 sm:grid-cols-2 pb-12">
                            {filteredAndSortedShops.length > 0 ? (
                                filteredAndSortedShops.map(shop => (
                                    <div key={shop.id} className="bg-white rounded-3xl p-6 shadow-[0_4px_20px_-8px_rgba(234,88,12,0.15)] border-2 border-orange-50 flex flex-col h-full hover:shadow-[0_8px_30px_-8px_rgba(234,88,12,0.25)] hover:-translate-y-1 transition-all duration-300">
                                        
                                        <div className="flex justify-between items-start mb-3">
                                            <h2 className="text-xl font-black text-amber-950 leading-tight pr-2">
                                                {shop.name}
                                            </h2>
                                            <div className="flex flex-col items-end gap-1">
                                                <span className="inline-flex items-center px-3 py-1 rounded-full text-xs font-bold bg-gradient-to-r from-red-50 to-orange-50 text-red-600 whitespace-nowrap border border-red-100">
                                                    {shop.city}
                                                </span>
                                                <span className="inline-flex items-center px-3 py-1 rounded-full text-xs font-bold bg-amber-50 text-amber-600 whitespace-nowrap">
                                                    {shop.district}
                                                </span>
                                            </div>
                                        </div>

                                        <div className="space-y-3 mt-2 flex-grow">
                                            <div className="flex items-start text-sm text-amber-800/80 font-medium">
                                                <MapPin className="w-4 h-4 mr-2.5 mt-0.5 flex-shrink-0 text-orange-400" />
                                                <span className="leading-relaxed">{shop.address}</span>
                                            </div>
                                            
                                            {shop.phone && (
                                                <div className="flex items-center text-sm text-amber-800/80 font-medium">
                                                    <Phone className="w-4 h-4 mr-2.5 flex-shrink-0 text-orange-400" />
                                                    <span>{shop.phone}</span>
                                                </div>
                                            )}
                                            
                                            {shop.hours && (
                                                <div className="flex items-start text-sm text-amber-800/80 font-medium">
                                                    <Clock className="w-4 h-4 mr-2.5 mt-0.5 flex-shrink-0 text-orange-400" />
                                                    <span className="leading-relaxed">{shop.hours}</span>
                                                </div>
                                            )}
                                        </div>

                                        <div className="mt-5 flex flex-wrap gap-2">
                                            {shop.tags.map(tag => (
                                                <span key={tag} className="px-2.5 py-1 bg-amber-100/50 text-amber-700 rounded-lg text-xs font-bold tracking-wide">
                                                    #{tag}
                                                </span>
                                            ))}
                                        </div>

                                        <button
                                            onClick={() => handleGoogleSearch(shop.name, shop.address)}
                                            className="mt-6 w-full flex items-center justify-center gap-2 bg-gradient-to-b from-orange-400 to-orange-500 hover:from-orange-500 hover:to-orange-600 text-white active:scale-95 py-3.5 rounded-2xl text-sm font-black transition-all shadow-[0_4px_14px_0_rgba(234,88,12,0.39)]"
                                        >
                                            <ExternalLink className="w-4 h-4" />
                                            開啟 Google 搜尋
                                        </button>
                                    </div>
                                ))
                            ) : (
                                <div className="col-span-full py-16 text-center bg-white/50 backdrop-blur-sm rounded-3xl border-2 border-dashed border-orange-200">
                                    <ChefHat className="w-16 h-16 text-orange-200 mx-auto mb-4 drop-shadow-sm" />
                                    <p className="text-orange-800/60 font-bold text-lg">哎呀，找不到這道美味</p>
                                    <button 
                                        onClick={() => {setSearchQuery(''); setActiveCity('全部'); setActiveDistrict('全部');}}
                                        className="mt-4 px-6 py-2 bg-orange-100 text-orange-600 hover:bg-orange-200 rounded-full text-sm font-bold transition-colors"
                                    >
                                        清除條件，重新探索
                                    </button>
                                </div>
                            )}
                        </div>
                    </main>
                </div>
            );
        }

        // --- 將 React App 渲染到畫面上 ---
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
